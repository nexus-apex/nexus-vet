{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Pet | NexusVet{% endblock %}
{% block page_title %}{% if editing %}Edit Pet{% else %}New Pet{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Species</label>
        <select name="species">
          <option value="dog" {% if record.species == 'dog' %}selected{% endif %}>Dog</option>
          <option value="cat" {% if record.species == 'cat' %}selected{% endif %}>Cat</option>
          <option value="bird" {% if record.species == 'bird' %}selected{% endif %}>Bird</option>
          <option value="rabbit" {% if record.species == 'rabbit' %}selected{% endif %}>Rabbit</option>
          <option value="fish" {% if record.species == 'fish' %}selected{% endif %}>Fish</option>
          <option value="reptile" {% if record.species == 'reptile' %}selected{% endif %}>Reptile</option>
          <option value="other" {% if record.species == 'other' %}selected{% endif %}>Other</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Breed</label>
        <input type="text" name="breed" value="{{ record.breed|default:'' }}">
      </div>
      <div class="form-group">
        <label>Age Years</label>
        <input type="number" name="age_years" value="{{ record.age_years|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Owner Name</label>
        <input type="text" name="owner_name" value="{{ record.owner_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Owner Phone</label>
        <input type="text" name="owner_phone" value="{{ record.owner_phone|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Weight Kg</label>
        <input type="number" step="0.01" name="weight_kg" value="{{ record.weight_kg|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="deceased" {% if record.status == 'deceased' %}selected{% endif %}>Deceased</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea name="notes">{{ record.notes|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Pet</button>
      <a href="/pets/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
