{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} PetOwner | NexusVet{% endblock %}
{% block page_title %}{% if editing %}Edit PetOwner{% else %}New PetOwner{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Address</label>
      <textarea name="address">{{ record.address|default:'' }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Pets Count</label>
        <input type="number" name="pets_count" value="{{ record.pets_count|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Total Spent</label>
        <input type="number" step="0.01" name="total_spent" value="{{ record.total_spent|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="inactive" {% if record.status == 'inactive' %}selected{% endif %}>Inactive</option>
        </select>
      </div>
      <div class="form-group">
        <label>Last Visit</label>
        <input type="date" name="last_visit" value="{{ record.last_visit|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} PetOwner</button>
      <a href="/petowners/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
